<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish Verb Trainer (Full System)</title>

    <style>
        body {
            font-family: Arial, serif;
            max-width: 1000px;
            margin: auto;
            padding: 20px;
            font-size: 20px;
        }
        button, input, select {
            padding: 10px;
            width: 100%;
            margin: 6px 0;
            font-size: 18px;
        }
        .good { color: green; }
        .bad { color: red; }
        .meta { color: gray; font-size: 14px; }

        .hidden {
            display: none;
        }

        #radioContainer {
            display: flex;
            gap: 30px;
        }

        .radioList label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            cursor: pointer;
        }

        .radioList input[type="radio"] {
            width: auto;
        }

        .radioList {
            display: grid;
            grid-template-columns: auto auto;
            gap: 4px 6px;
            justify-content: start;
        }

        .radioGroup {
            flex: 1;
        }
        .radioList label {
            padding: 4px 6px;
            border-radius: 6px;
            transition: background 0.15s ease;
        }

        .radioList label:hover {
            background: #f2f2f2;
        }

        .radioList input[type="radio"]:checked + span {
            font-weight: normal;
        }

        #verbSelectorContainer label,
        #tenseSelectorContainer label {
            display:     flex;
            align-items: center;
            gap:         8px;
            margin:      3px 0;
            cursor:      pointer;
        }

        #verbSelectorContainer input,
        #tenseSelectorContainer input {
            width: auto;
        }

        #verbSelectorContainer {
            display: flex;
            gap:     40px;
        }

        #verbSelectorContainer > div {
            flex: 1;
        }

        #fullConjugation {
            font-size: 12px; /* overall smaller */
        }

        #fullConjugation table {
            width: 100%;
            table-layout: fixed; /* forces columns to fit */
        }

        #fullConjugation td {
            text-align: left;
            white-space: nowrap;
        }

        /* only apply alignment when aux exists */
        .withAux .aux {
            display:    inline-block;
            width:      50px;
            text-align: left;
            color:      #666;
        }

        .withAux .main {
            margin-left: 6px;
        }

        /* no aux → no spacing hack */
        .noAux {
            padding-left: 0;
        }

        /* highlight irregular forms */
        .irregular .main {
            color: #a93226;
        }}

        #tenseRadios span,
        #personRadios span {
            font-size: 14px;
        }

        #tenseRadios label,
        #personRadios label {
            font-size: 14px;
        }

        #tenseControls button {
            width:     auto;         /* don’t stretch full width */
            padding:   6px 10px;      /* smaller padding */
            font-size: 12px;         /* smaller text */
            margin:    2px;          /* tighter spacing */
        }

        #tenseControls {
            display:  flex;
            gap:      8px;
        }

        #verbControls button {
            width: auto;
            padding: 6px 10px;
            font-size: 14px;
            margin: 3px;
        }

        #verbControls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap; /* optional: wraps nicely if screen is narrow */
        }

        #topBar {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }

        #topBar button {
            width: auto;
            min-width: 170px;
        }

        #modeLabel {
            font-size: 14px;
            color: #555;
            min-width: 100px;
        }

        #modeLabel {
            font-size: 14px;
            color: #555;
        }

    </style>
</head>

<body>

<h2>Spanish Verb Trainer</h2>

<div id="topBar">
    <button onclick="switchMode()">Mode</button>
    <span id="modeLabel">production</span>

    <button onclick="toggleVerbSelector()">Select verbs</button>
    <button onclick="toggleTenseSelector()">Select tenses</button>
</div>

<div id="selectionUI">

    <div id="verbControls" style="display:none;">
        <button onclick="selectAllVerbs()">All</button>
        <button onclick="selectNoneVerbs()">None</button>
        <button onclick="selectRegular()">Regular</button>
        <button onclick="selectIrregular()">Irregular</button>
    </div>

    <div id="verbSelectorContainer" style="display:none;"></div>

    <div id="tenseControls" style="display:none;">
        <button onclick="selectAllTenses()">All</button>
        <button onclick="selectNoneTenses()">None</button>
    </div>

    <div id="tenseSelectorContainer" style="display:none;"></div>

</div>

<button onclick="nextQ()">Next Question</button>

<h3 id="question"></h3>

<input id="answer" placeholder="Type answer (production mode)">

<div id="recognitionUI">

        </div>

        <div class="radioGroup">

        </div>
    </div>

</div>
<button onclick="check()">Check</button>


<p id="feedback"></p>

<div id="fullConjugation" style="margin-top:20px;"></div>

    let currentMode = Modes.PRODUCTION;

    function updateUIForMode() {

        const recognitionUI = document.getElementById("recognitionUI");
        const answerInput = document.getElementById("answer");

        if (currentMode === Modes.PRODUCTION) {
            recognitionUI.classList.add("hidden");
            answerInput.classList.remove("hidden");
        } else {
            recognitionUI.classList.remove("hidden");
            answerInput.classList.add("hidden");
        }
    }

    // ================= SRS =================

    let srs = JSON.parse(localStorage.getItem("srs") || "{}");

    function getKey(v,t,p) {
        return v+"|"+t+"|"+p;
    }

    function getCard(v,t,p) {
        const k = getKey(v,t,p);
        if (!srs[k]) srs[k] = {ease:2.5, interval:1};
        return srs[k];
    }

    function updateSRS(card, correct) {
        if (correct) {
            card.interval = Math.round(card.interval * card.ease);
            card.ease += 0.1;
        } else {
            card.interval = 1;
            card.ease = Math.max(1.3, card.ease - 0.2);
        }
        localStorage.setItem("srs", JSON.stringify(srs));
    }

    // ================= MODE HANDLERS =================

    const ModeHandlers = {

        production: {
            generate(item) {
                return {
                    question: `${subjects[item.s.i].p} ... (${item.v}) [${tenseLabels[item.t]}]`
                };
            },
            render(q) {
                document.getElementById("question").innerHTML = q.question;
            },
            check(input, item) {

                const correct = conjugate(item.v, item.t, item.s.i);

                const rawInput = input.trim().toLowerCase();
                const rawCorrect = correct.toLowerCase();

                const normalizedInput = normalize(input);
                const normalizedCorrect = normalize(correct);

                if (rawInput === rawCorrect) {
                    return {
                        correct: true,
                        almost: false,
                        correctAnswer: correct
                    };
                }

                if (normalizedInput === normalizedCorrect) {
                    return {
                        correct: false,
                        almost: true,
                        correctAnswer: correct
                    };
                }

                return {
                    correct: false,
                    almost: false,
                    correctAnswer: correct
                };
            }
        },

        recognition: {
            generate(item) {
                const form = conjugate(item.v, item.t, item.s.i);
                return {
                    question: `<b>${form}</b><br><span class="meta">Identify verb, tense, person</span>`
                };
            },
            render(q) {
                document.getElementById("question").innerHTML = q.question;
            },
            check(_, item) {

                const verb = document.getElementById("verbGuess").value;
                const tense = getSelectedRadio("tenseRadio");
                const person = getSelectedRadio("personRadio");

                const form = conjugate(item.v, item.t, item.s.i);

                const matches = getAllMatches(form);

                const userCorrect = matches.some(m =>
                    m.v === verb &&
                    m.t === tense &&
                    String(m.p) === String(person)
                );

                return {
                    correct: userCorrect,
                    matches: matches
                };
            }
        }
    };

    function selectAllVerbs() {
        setVerbSelection(verbs.map(v => v.name));
    }

    function selectNoneVerbs() {
        setVerbSelection([]);
    }

    function selectRegular() {
        const regular = verbs
            .filter(v => v.pattern === "none")
            .map(v => v.name);

        setVerbSelection(regular);
    }

    function selectIrregular() {
        const irregular = verbs
            .filter(v => v.pattern !== "none")
            .map(v => v.name);

        setVerbSelection(irregular);
    }

    function setVerbSelection(list) {
        localStorage.setItem("selectedVerbs", JSON.stringify(list));
        renderVerbSelector();
        renderVerbDropdown();   // 👈 ADD THIS
    }

    function getPracticeList() {
        return JSON.parse(localStorage.getItem("practiceVerbs") || "[]");
    }

    function selectAllTenses() {
        setTenseSelection(Object.keys(tenseLabels));
    }

    function selectNoneTenses() {
        setTenseSelection([]);
    }

    function setTenseSelection(list) {
        localStorage.setItem("selectedTenses", JSON.stringify(list));
        renderTenseSelector(); // refresh UI
    }

    function savePracticeList(list) {
        localStorage.setItem("practiceVerbs", JSON.stringify(list));
    }

    function isInPractice(verb) {
        return getPracticeList().includes(verb);
    }

    function getAllMatches(form) {
        const matches = [];

        const selectedVerbs = getSelectedVerbs();
        const selectedTenses = getSelectedTenses();

        selectedVerbs.forEach(v => {
            selectedTenses.forEach(t => {
                subjects.forEach(s => {

                    const candidate = conjugate(v, t, s.i);

                    if (candidate === form) {
                        matches.push({
                            v,
                            t,
                            p: s.i
                        });
                    }

                });
            });
        });

        return matches;
    }


    let current = {};
    let totalQuestions = 0;
    let correctAnswers = 0;

    function nextQ() {

        document.getElementById("fullConjugation").innerHTML = "";
        answered = false;
        totalQuestions++;

        const selectedVerbs = getSelectedVerbs();
        const selectedTenses = getSelectedTenses();

        if (selectedVerbs.length === 0 || selectedTenses.length === 0) {
            document.getElementById("question").innerText =
                "Select at least one verb and one tense";
            return;
        }

        const v = selectedVerbs[Math.floor(Math.random()*selectedVerbs.length)];
        const t = selectedTenses[Math.floor(Math.random()*selectedTenses.length)];
        const s = subjects[Math.floor(Math.random()*subjects.length)];

        const card = getCard(v, t, s.i);

        current = {v, t, s, card};

        const handler = ModeHandlers[currentMode];
        const q = handler.generate(current);
        handler.render(q);

        document.getElementById("answer").value = "";
        document.getElementById("feedback").innerText = "";

        if (currentMode === Modes.PRODUCTION) {
            document.getElementById("answer").focus();
        }
    }

    function check() {

        if (!current.v || !current.t) return;

        const handler = ModeHandlers[currentMode];
        const result = handler.check(
            document.getElementById("answer").value,
            current
        );

        updateSRS(current.card, result.correct);

        if (result.correct) {
            correctAnswers++;

            if (currentMode === Modes.RECOGNITION && result.matches && result.matches.length > 1) {

                const verb = document.getElementById("verbGuess").value;
                const tense = getSelectedRadio("tenseRadio");
                const person = getSelectedRadio("personRadio");

                const alternatives = result.matches
                    .filter(m =>
                        !(m.v === verb &&
                            m.t === tense &&
                            String(m.p) === String(person))
                    )
                    .map(m => `${m.v} — ${tenseLabels[m.t]} — ${subjects[m.p].p}`)
                    .join("<br>");

                document.getElementById("feedback").innerHTML =
                    `<span class='good'>Correct</span><br>
                 <span class="meta">Also possible:<br>${alternatives}</span>`;
            } else {
                document.getElementById("feedback").innerHTML =
                    "<span class='good'>Correct</span>";
            }

        } else if (result.almost) {

            document.getElementById("feedback").innerHTML =
                `<span style="color: orange;">Almost (accent issue)</span><br>
         <span class="meta">Correct: ${result.correctAnswer}</span>`;

        } else {

            if (currentMode === Modes.RECOGNITION && result.matches && result.matches.length > 0) {

                const solutions = result.matches
                    .map(m => `${m.v} — ${tenseLabels[m.t]} — ${subjects[m.p].p}`)
                    .join("<br>");

                document.getElementById("feedback").innerHTML =
                    `<span class='bad'>Incorrect</span><br>
                 <span class="meta">Correct answer(s):<br>${solutions}</span>`;

            } else {

                // production mode
                const correct = conjugate(current.v, current.t, current.s.i);

                document.getElementById("feedback").innerHTML =
                    `<span class='bad'>Incorrect</span><br>
                 <span class="meta">Correct: ${correct}</span>`;
            }
        }


        renderFullConjugation(current.v);
        updateCounter();

        return result.correct;
    }

    function updateCounter() {
        document.getElementById("counter").innerText =
            `Questions: ${totalQuestions} | Correct: ${correctAnswers}`;
    }

    // ================= MODE SWITCH =================

    function switchMode() {
        currentMode =
            currentMode === Modes.PRODUCTION
                ? Modes.RECOGNITION
                : Modes.PRODUCTION;

        document.getElementById("modeLabel").innerText =
            currentMode;

        updateUIForMode();
    }

    // ================= CONJUGATION =================

    function conjugate(v, t, p) {

        const verbObj = verbs.find(x => x.name === v);
        const isReflexive = verbObj?.reflexive;
        const base = isReflexive ? v.slice(0,-2) : v;

        let result;

        if (t === "perfecto") {
            result = haber[p] + " " + participle(base);
        }
        else if (t === "gerundio") {
            result = estar[p] + " " + gerund(base);
        }
        else if (t === "futuro") {
            const endings = ["é","ás","á","emos","éis","án"];
            const stem = verbObj?.futureStem || base;
            result = stem + endings[p];
        }
        else if (t === "condicional") {
            const endings = ["ía","ías","ía","íamos","íais","ían"];
            const stem = verbObj?.futureStem || base;
            result = stem + endings[p];
        }
        else if (irregulars[v] && irregulars[v][t]) {
            result = irregulars[v][t][p];
        }
        else {
            const stem = base.slice(0,-2);
            const end = base.slice(-2);

            const endings = {
                present: {
                    ar: ["o","as","a","amos","áis","an"],
                    er: ["o","es","e","emos","éis","en"],
                    ir: ["o","es","e","imos","ís","en"]
                },
                indefinido: {
                    ar: ["é","aste","ó","amos","asteis","aron"],
                    er: ["í","iste","ió","imos","isteis","ieron"],
                    ir: ["í","iste","ió","imos","isteis","ieron"]
                },
                imperfecto: {
                    ar: ["aba","abas","aba","ábamos","abais","aban"],
                    er: ["ía","ías","ía","íamos","íais","ían"],
                    ir: ["ía","ías","ía","íamos","íais","ían"]
                }
            };

            result = stem + endings[t][end][p];
        }

        if (isReflexive) {
            return reflexivePronouns[p] + " " + result;
        }

        return result;
    }

    function participle(v) {
        const obj = verbs.find(x => x.name === v);
        if (obj?.participle) return obj.participle;
        return v.endsWith("ar") ? v.slice(0,-2)+"ado" : v.slice(0,-2)+"ido";
    }

    function gerund(v) {
        const obj = verbs.find(x => x.name === v);
        if (obj?.gerund) return obj.gerund;
        return v.endsWith("ar") ? v.slice(0,-2)+"ando" : v.slice(0,-2)+"iendo";
    }

    function normalize(str) {
        return str.toLowerCase().trim()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g,"");
    }

    // ================= UI =================

    function renderVerbDropdown() {

        const sel = document.getElementById("verbGuess");
        sel.innerHTML = ""; // clear previous options

        const selectedVerbs = getSelectedVerbs();

        selectedVerbs.forEach(vName => {
            const opt = document.createElement("option");
            opt.value = vName;
            opt.textContent = vName;
            sel.appendChild(opt);
        });
    }


    function renderRadios() {

        const tenseDiv = document.getElementById("tenseRadios");
        tenseDiv.innerHTML = "";

        Object.keys(tenseLabels).forEach(t => {
            const label = document.createElement("label");

            const rb = document.createElement("input");
            rb.type = "radio";
            rb.name = "tenseRadio";
            rb.value = t;

            const span = document.createElement("span");
            span.textContent = tenseLabels[t];

            label.appendChild(rb);
            label.appendChild(span);

            tenseDiv.appendChild(label);
        });

        const personDiv = document.getElementById("personRadios");
        personDiv.innerHTML = "";

        const reordered = [];
        const half = Math.ceil(subjects.length / 2);

        for (let i = 0; i < half; i++) {
            if (subjects[i]) reordered.push(subjects[i]);
            if (subjects[i + half]) reordered.push(subjects[i + half]);
        }

        reordered.forEach(s => {
            const label = document.createElement("label");

            const rb = document.createElement("input");
            rb.type = "radio";
            rb.name = "personRadio";
            rb.value = s.i;

            const span = document.createElement("span");
            span.textContent = s.p;

            label.appendChild(rb);
            label.appendChild(span);

            personDiv.appendChild(label);
        });

        // 👇 Auto-select defaults
        const firstTense = document.querySelector('input[name="tenseRadio"]');
        const firstPerson = document.querySelector('input[name="personRadio"]');

        if (firstTense) firstTense.checked = true;
        if (firstPerson) firstPerson.checked = true;
    }

    let answered = false;

    document.addEventListener("keydown", function(e) {

        // 👇 ONLY trigger when relevant
        const isInputFocused = document.activeElement.id === "answer";

        if (e.key === "Enter" && (isInputFocused || currentMode === Modes.RECOGNITION)) {

            e.preventDefault(); // 👈 prevents weird double triggers

            if (!answered) {
                const result = check();
                if (result !== undefined) answered = true;
            } else {
                nextQ();
                answered = false;
            }
        }
    });

    function getSelectedRadio(name) {
        const el = document.querySelector(`input[name="${name}"]:checked`);
        return el ? el.value : null;
    }

    function toggleVerbSelector() {
        const container = document.getElementById("verbSelectorContainer");
        const controls = document.getElementById("verbControls");

        if (container.style.display === "none") {
            container.style.display = "flex";
            controls.style.display = "flex";   // 👈 IMPORTANT
            renderVerbSelector();
        } else {
            container.style.display = "none";
            controls.style.display = "none";   // 👈 IMPORTANT
        }
    }

    function toggleTenseSelector() {
        const container = document.getElementById("tenseSelectorContainer");
        const controls = document.getElementById("tenseControls");

        if (container.style.display === "none") {
            container.style.display = "grid";
            controls.style.display = "flex";
            renderTenseSelector();
        } else {
            container.style.display = "none";
            controls.style.display = "none";
        }
    }

    function renderVerbSelector() {
        const container = document.getElementById("verbSelectorContainer");
        container.innerHTML = "";

        const selected = JSON.parse(localStorage.getItem("selectedVerbs") || "null");

        const half = Math.ceil(verbs.length / 2);
        const col1 = verbs.slice(0, half);
        const col2 = verbs.slice(half);

        function createColumn(list) {
            const col = document.createElement("div");

            list.forEach(v => {
                const label = document.createElement("label");

                const cb = document.createElement("input");
                cb.type = "checkbox";
                cb.value = v.name;
                cb.checked = selected ? selected.includes(v.name) : true;

                cb.addEventListener("change", saveVerbSelection);

                label.appendChild(cb);
                label.appendChild(document.createTextNode(" " + v.name));

                col.appendChild(label);
            });

            return col;
        }

        container.appendChild(createColumn(col1));
        container.appendChild(createColumn(col2));
    }

    function renderTenseSelector() {
        const container = document.getElementById("tenseSelectorContainer");
        container.innerHTML = "";

        const selected = JSON.parse(localStorage.getItem("selectedTenses") || "null");

        Object.keys(tenseLabels).forEach(t => {
            const label = document.createElement("label");

            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.value = t;
            cb.checked = selected ? selected.includes(t) : true;

            cb.addEventListener("change", saveTenseSelection);

            label.appendChild(cb);
            label.appendChild(document.createTextNode(" " + tenseLabels[t]));

            container.appendChild(label);
        });
    }

    function saveVerbSelection() {
        const selected = Array.from(
            document.querySelectorAll("#verbSelectorContainer input:checked")
        ).map(cb => cb.value);

        localStorage.setItem("selectedVerbs", JSON.stringify(selected));
    }

    function saveTenseSelection() {
        const selected = Array.from(
            document.querySelectorAll("#tenseSelectorContainer input:checked")
        ).map(cb => cb.value);

        localStorage.setItem("selectedTenses", JSON.stringify(selected));
    }

    function getSelectedVerbs() {
        return JSON.parse(localStorage.getItem("selectedVerbs") || "[]");
    }

    function getSelectedTenses() {
        return JSON.parse(localStorage.getItem("selectedTenses") || "[]");
    }


    function renderFullConjugation(verb) {

        const tenses = Object.keys(tenseLabels);

        let html = `<h4>${verb}</h4><table><tr><td></td>`;

        tenses.forEach(t => {
            html += `<td><b>${shortLabels[t]}</b></td>`;
        });

        html += "</tr>";

        subjects.forEach(s => {

            html += `<tr><td><b>${s.p}</b></td>`;

            tenses.forEach(t => {

                const form = conjugate(verb, t, s.i);
                const parts = form.split(" ");
                let isIrregular = false;

                // 1. Standard irregular tables
                if (
                    irregulars[verb] &&
                    irregulars[verb][t] &&
                    irregulars[verb][t][s.i]
                ) {
                    isIrregular = true;
                }

                // 2. Irregular participles (perfecto)
                if (t === "perfecto") {
                    const obj = verbs.find(x => x.name === verb);
                    if (obj?.participle) isIrregular = true;
                }

                // 3. Irregular gerunds (gerundio)
                if (t === "gerundio") {
                    const obj = verbs.find(x => x.name === verb);
                    if (obj?.gerund) isIrregular = true;
                }

                const cls = isIrregular ? "irregular" : "";

                if (parts.length === 2) {
                    html += `
                        <td class="withAux ${cls}">
                            <span class="aux">${parts[0]}</span>
                            <span class="main">${parts[1]}</span>
                        </td>`;
                } else {
                    html += `
                        <td class="noAux ${cls}">
                            <span class="main">${form}</span>
                        </td>`;
                }

            });

            html += "</tr>";
        });

        html += "</table>";

        document.getElementById("fullConjugation").innerHTML = html;
    }

    // ================= INIT =================

    // 👇 Initialize selections if not present
    if (!localStorage.getItem("selectedVerbs")) {
        localStorage.setItem("selectedVerbs", JSON.stringify(verbs.map(v => v.name)));
    }

    if (!localStorage.getItem("selectedTenses")) {
        localStorage.setItem("selectedTenses", JSON.stringify(Object.keys(tenseLabels)));
    }

    renderVerbDropdown();
    renderRadios();
    updateUIForMode();

</script>

</body>
