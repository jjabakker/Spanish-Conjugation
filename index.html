<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish Trainer v7</title>
    <style>
        body {
            font-family: Arial, serif;
            max-width: 800px;
            margin: auto;
            padding: 30px;
            font-size: 22px;
            line-height: 1.5;
        }

        h2 {
            font-size: 26px;
        }

        h3 {
            font-size: 30px;
            font-weight: bold;
            margin: 25px 0;
        }

        input, button {
            padding: 14px;
            width: 100%;
            margin: 10px 0;
            font-size: 22px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #f2f2f2;
        }

        .good {
            color: green;
            font-size: 26px;
        }

        .bad {
            color: red;
            font-size: 26px;
        }

        .meta, #counter {
            font-size: 18px;
            color: gray;
        }

        .tense {
            font-size: 16px;
            color: gray;
            margin-left: 10px;
        }

        #verbSelector {
            column-count: 2;
            column-gap: 20px;
        }

        #verbSelector label {
            display: block;
            margin-bottom: 5px;
        }

        #tenseSelector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 20px;
            margin-top: 10px;
        }

        .selector-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .selector-buttons button {
            padding: 6px;
            font-size: 16px;
            width: auto;
        }

        label {
            display: flex;
            align-items: center;
        }

        label input[type="checkbox"] {
            margin-right: 8px;
            width: auto;
        }
    </style>
</head>
<body>

<h2>Spanish Trainer v7</h2>

<input id="verbs" value="
    aparecer,
    aprender,
    abrir,
    comer,
    conocer,
    caber,
    dar,
    dejar,
    decidir,
    decir,
    dormir,
    entender,
    escribir,
    estar,
    girar,
    haber,
    hacer,
    hablar,
    ir,
    jugar,
    levantar,
    levantarse,
    poner,
    poder,
    romper,
    saber,
    sentir,
    ser,
    tener,
    traer,
    venir,
    ver,
    vestirse,
    vivir,
    volver,
    salir,
    querer"
       style="display:none;">

<button onclick="toggleVerbSelector()">Select verbs</button>
<div id="verbSelectorContainer" style="display:none; margin-bottom:15px;">
    <div class="selector-buttons">
        <button onclick="selectAll('verbSelector','selectedVerbs')">Select All</button>
        <button onclick="selectNone('verbSelector','selectedVerbs')">Select None</button>
        <button onclick="selectRegularVerbs()">Regular</button>
        <button onclick="selectIrregularVerbs()">Irregular</button>
    </div>
    <div id="verbSelector"></div>
</div>

<button onclick="toggleTenseSelector()">Select tenses</button>
<div id="tenseSelectorContainer" style="display:none; margin-bottom:15px;">
    <div class="selector-buttons">
        <button onclick="selectAll('tenseSelector','selectedTenses')">Select All</button>
        <button onclick="selectNone('tenseSelector','selectedTenses')">Select None</button>
    </div>
    <div id="tenseSelector"></div>
</div>

<button onclick="nextQ()">Next Question</button>

<h3 id="question"></h3>
<input id="answer" placeholder="Type answer">
<button onclick="check()">Check</button>
<button id="toggleConjugationBtn" onclick="toggleFullConjugation()">Show full conjugation</button>

<p id="fullConjugation" class="meta" style="display:none;"></p>
<p id="feedback"></p>
<p class="meta" id="counter">Questions: 0 | Correct: 0</p>

<script>
    const irregularVerbs = [
        "ser","ir","haber","tener","hacer","decir","ver",
        "poder","saber","estar","venir","traer",
        "poner","salir","querer","volver","dormir","sentir","jugar"
    ];

    const tenseLabels = {
        present:    "Presente",
        perfecto:   "Pretérito Perfecto",
        indefinido: "Pretérito Indefinido",
        imperfecto: "Pretérito Imperfecto",
        gerundio:   "Gerundio"
    };
    const subjects = [{p: "yo", i: 0}, {p: "tú", i: 1}, {p: "él", i: 2}, {p: "nosotros", i: 3}, {
        p: "vosotros",
        i: 4
    }, {p: "ellos", i: 5}];
    const haber = ["he", "has", "ha", "hemos", "habéis", "han"];
    const estarForms = ["estoy", "estás", "está", "estamos", "estáis", "están"];
    const sentenceTemplates = {
        present:    ["Hoy ___", "Siempre ___"],
        perfecto:   ["Hoy ___", "Esta semana ___"],
        indefinido: ["Ayer ___", "Anoche ___"],
        imperfecto: ["Antes ___", "Cuando era joven ___"],
        gerundio:   ["Ahora ___", "En este momento ___"]
    };

    // const irregularParticiples = {
    //     abrir:      "geopend",
    //     aparecer:   "verschenen",
    //     aprender:   "geleerd",
    //     comer:      "gegeten",

    const spanishIrregularParticiples = {
        abrir: "abierto",
        decir: "dicho",
        escribir: "escrito",
        hacer: "hecho",
        poner: "puesto",
        romper: "roto",

        volver: "vuelto",
        tener: "tenido",
        ser: "sido",
        ir: "ido",
        estar: "estado",
        traer: "traído",
        venir: "venido",
        // add more irregulars as needed
    };

    function participle(v) {
        return spanishIrregularParticiples[v] || (v.endsWith("ar") ? v.slice(0,-2) + "ado" : v.slice(0,-2) + "ido");
    }

    const dutchDict = {
        aparecer:   {inf: "verschijnen"},
        aprender:   {inf: "leren"},
        abrir:      {inf: "openen"},
        caber:      {inf: "passen"},
        comer:      {inf: "eten", pp: "gegeten"},
        conocer:    {inf: "kennen"},
        dar:        {inf: "geven", pp: "gegeven"},
        dejar:      {inf: "laten"},
        decidir:    {inf: "beslissen"},
        decir:      {inf: "zeggen", pp: "gezegd"},
        dormir:     {inf: "slapen", pp: "geslapen"},
        entender:   {inf: "begrijpen", pp: "begrepen"},
        escribir:   {inf: "schrijven", pp: "geschreven"},
        estar:      {inf: "zijn", pp: "geweest"},
        girar:      {inf: "draaien", pp: "gedraaid"},
        haber:      {inf: "hebben"},
        hacer:      {inf: "doen", pp: "gedaan"},
        hablar:     {inf: "spreken", pp: "gesproken"},
        ir:         {inf: "gaan", pp: "gegaan"},
        jugar:      {inf: "spelen", pp: "gespeeld"},
        levantar:   {inf: "optillen", pp: "opgetild"},
        levantarse: {inf: "opstaan", separable: true, reflexive: true, pp: "opgestaan"},
        poner:      {inf: "zetten", pp: "gezet"},
        poder:      {inf: "kunnen"},
        romper:     {inf: "breken", pp: "gebroken"},
        saber:      {inf: "weten", pp: "geweten"},
        sentir:     {inf: "voelen", pp: "gevoeld"},
        ser:        {inf: "zijn", pp: "geweest"},
        tener:      {inf: "hebben", pp: "gehad"},
        traer:      {inf: "brengen", pp: "gebracht"},
        venir:      {inf: "komen", pp: "gekomen"},
        ver:        {inf: "zien", pp: "gezien"},
        vestirse:   {inf: "zich aankleden", separable: true, reflexive: true, pp: "aangekleed"},
        vivir:      {inf: "leven", pp: "geleefd"},
        volver:     {inf: "terugkomen", pp: "teruggekomen"},
        salir:      {inf: "vertrekken", pp: "vertrokken"},
        querer:     {inf: "willen", pp: "gewild"}
    };

    /*const irregularPast = {
        doen:      ["deed","deed","deed","deden","deden","deden"],
        eten:      ["at","at","at","aten","aten","aten"],
        geven:     ["gaf","gaf","gaf","gaven","gaven","gaven"],
        komen:     ["kwam","kwam","kwam","kwamen","kwamen","kwamen"],
        schrijven: ["schreef","schreef","schreef","schreven","schreven","schreven"],
        spreken:   ["sprak","sprak","sprak","spraken","spraken","spraken"],
        staan:     ["stond","stond","stond","stonden","stonden","stonden"],
        willen:    ["wil","wil","wil","willen","willen","willen"],
        gaan:      ["ging","ging","ging","gingen","gingen","gingen"],
        zien:      ["zag","zag","zag","zagen","zagen","zagen"],
        zijn:      ["was","was","was","waren","waren","waren"],
        hebben:    ["had","had","had","hadden","hadden","hadden"]
    };*/

    const irregulars = {
        ir: {
            present: ["voy", "vas", "va", "vamos", "vais", "van"],
            perfecto: ["ido", "ido", "ido", "ido", "ido", "ido"],
            indefinido: ["fui", "fuiste", "fue", "fuimos", "fuisteis", "fueron"],
            imperfecto: ["iba", "ibas", "iba", "íbamos", "ibais", "iban"]
        },
        ser: {
            present: ["soy", "eres", "es", "somos", "sois", "son"],
            perfecto: ["sido", "sido", "sido", "sido", "sido", "sido"],
            indefinido: ["fui", "fuiste", "fue", "fuimos", "fuisteis", "fueron"],
            imperfecto: ["era", "eras", "era", "éramos", "erais", "eran"]
        },
        haber: {
            present: ["he", "has", "ha", "hemos", "habéis", "han"],
            perfecto: ["habido", "habido", "habido", "habido", "habido", "habido"],
            indefinido: ["hube", "hubiste", "hubo", "hubimos", "hubisteis", "hubieron"],
            imperfecto: ["había", "habías", "había", "habíamos", "habíais", "habían"]
        },
        tener: {
            present: ["tengo", "tienes", "tiene", "tenemos", "tenéis", "tienen"],
            perfecto: ["tenido","tenido","tenido","tenido","tenido","tenido"],
            indefinido: ["tuve","tuviste","tuvo","tuvimos","tuvisteis","tuvieron"],
            imperfecto: ["tenía","tenías","tenía","teníamos","teníais","tenían"]
        },
        hacer: {
            present: ["hago","haces","hace","hacemos","hacéis","hacen"],
            perfecto: ["hecho","hecho","hecho","hecho","hecho","hecho"],
            indefinido: ["hice","hiciste","hizo","hicimos","hicisteis","hicieron"],
            imperfecto: ["hacía","hacías","hacía","hacíamos","hacíais","hacían"]
        },
        decir: {
            present: ["digo","dices","dice","decimos","decís","dicen"],
            perfecto: ["dicho","dicho","dicho","dicho","dicho","dicho"],
            indefinido: ["dije","dijiste","dijo","dijimos","dijisteis","dijeron"],
            imperfecto: ["decía","decías","decía","decíamos","decíais","decían"]
        },
        ver: {
            present: ["veo","ves","ve","vemos","veis","ven"],
            perfecto: ["visto","visto","visto","visto","visto","visto"],
            indefinido: ["vi","viste","vio","vimos","visteis","vieron"],
            imperfecto: ["veía","veías","veía","veíamos","veíais","veían"]
        },
        poder: {
            present: ["puedo","puedes","puede","podemos","podéis","pueden"],
            perfecto: ["podido","podido","podido","podido","podido","podido"],
            indefinido: ["pude","pudiste","pudo","pudimos","pudisteis","pudieron"],
            imperfecto: ["podía","podías","podía","podíamos","podíais","podían"]
        },
        saber: {
            present: ["sé","sabes","sabe","sabemos","sabéis","saben"],
            perfecto: ["sabido","sabido","sabido","sabido","sabido","sabido"],
            indefinido: ["supe","supiste","supo","supimos","supisteis","supieron"],
            imperfecto: ["sabía","sabías","sabía","sabíamos","sabíais","sabían"]
        },
        estar: {
            present: ["estoy","estás","está","estamos","estáis","están"],
            perfecto: ["estado","estado","estado","estado","estado","estado"],
            indefinido: ["estuve","estuviste","estuvo","estuvimos","estuvisteis","estuvieron"],
            imperfecto: ["estaba","estabas","estaba","estábamos","estabais","estaban"]
        },
        venir: {
            present: ["vengo","vienes","viene","venimos","venís","vienen"],
            perfecto: ["venido","venido","venido","venido","venido","venido"],
            indefinido: ["vine","viniste","vino","vinimos","vinisteis","vinieron"],
            imperfecto: ["venía","venías","venía","veníamos","veníais","venían"]
        },
        traer: {
            present: ["traigo","traes","trae","traemos","traéis","traen"],
            perfecto: ["traído","traído","traído","traído","traído","traído"],
            indefinido: ["traje","trajiste","trajo","trajimos","trajisteis","trajeron"],
            imperfecto: ["traía","traías","traía","traíamos","traíais","traían"]
        }
        // you can continue adding more irregular verbs here
    };

    // --- your irregulars and dutchTranslationsTense definitions go here (copy from your previous code) ---
    // to save space, assume they are pasted here exactly as in your HTML


    function gerund(v) {
        return v.endsWith("ar") ? v.slice(0, -2) + "ando" : v.slice(0, -2) + "iendo";
    }

    function normalizeAccents(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ñ/g, "n");
    }

    function conjugate(v, t, p) {
        if (t === "perfecto")
            return haber[p] + " " + participle(v);
        if (t === "gerundio")
            return estarForms[p] + " " + gerund(v);
        if (irregulars[v] && irregulars[v][t])
            return irregulars[v][t][p];
        let stem = v.slice(0, -2), end = v.slice(-2), endings = {
            present: {
                ar: ["o", "as", "a", "amos", "áis", "an"],
                er: ["o", "es", "e", "emos", "éis", "en"],
                ir: ["o", "es", "e", "imos", "ís", "en"]
            },
            indefinido: {
                ar: ["é", "aste", "ó", "amos", "asteis", "aron"],
                er: ["í", "iste", "ió", "imos", "isteis", "ieron"],
                ir: ["í", "iste", "ió", "imos", "isteis", "ieron"]
            },
            imperfecto: {
                ar: ["aba", "abas", "aba", "ábamos", "abais", "aban"],
                er: ["ía", "ías", "ía", "íamos", "íais", "ían"],
                ir: ["ía", "ías", "ía", "íamos", "íais", "ían"]
            }
        };
        return stem + endings[t][end][p];
    }

    function renderCheckboxes(containerId, items, storageKey) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        let saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
        items.forEach(i => {
            const value = i.v || i;
            const checked = saved.includes(value);
            const label = document.createElement("label");
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.value = value;
            cb.checked = checked;
            cb.addEventListener("change", () => getSelected(containerId, storageKey));
            label.appendChild(cb);
            label.appendChild(document.createTextNode(" " + (i.l || i)));
            container.appendChild(label);
        });
    }

    function getSelected(containerId, storageKey) {
        const cbs = document.querySelectorAll(`#${containerId} input[type=checkbox]`);
        const selected = Array.from(cbs).filter(cb => cb.checked).map(cb => cb.value);
        localStorage.setItem(storageKey, JSON.stringify(selected));
        return selected;
    }

    function getSelectedVerbs() {
        return getSelected("verbSelector", "selectedVerbs");
    }

    function getSelectedTenses() {
        return getSelected("tenseSelector", "selectedTenses");
    }

    function selectAll(containerId, storageKey) {
        document.querySelectorAll(`#${containerId} input`).forEach(cb => cb.checked = true);
        getSelected(containerId, storageKey);
    }

    function selectNone(containerId, storageKey) {
        document.querySelectorAll(`#${containerId} input`).forEach(cb => cb.checked = false);
        getSelected(containerId, storageKey);
    }

    function toggleVerbSelector() {
        const c = document.getElementById("verbSelectorContainer");
        c.style.display = c.style.display === "none" ? "block" : "none";
        renderCheckboxes("verbSelector", getVerbList(), "selectedVerbs");
    }

    function toggleTenseSelector() {
        const c = document.getElementById("tenseSelectorContainer");
        c.style.display = c.style.display === "none" ? "block" : "none";
        const tensesForCheckbox = Object.keys(tenseLabels).map(key => ({v: key, l: tenseLabels[key]}));
        renderCheckboxes("tenseSelector", tensesForCheckbox, "selectedTenses");
    }

    function getVerbList() {
        return document.getElementById("verbs").value.split(",").map(v => v.trim()).filter(v => v.length > 0);
    }

    let srs = JSON.parse(localStorage.getItem("srs") || "{}"), current = {}, totalQuestions = 0, correctAnswers = 0;

    function getKey(v, t, p) {
        return v + "|" + t + "|" + p;
    }

    function getCard(v, t, p) {
        let k = getKey(v, t, p);
        if (!srs[k]) srs[k] =
            {ease: 2.5, interval: 1, due: 0};
        return srs[k];
    }

    let recentKeys = [];   // add this at the top, next to `current`

    function pickCard(verbs, tenses) {
        if (verbs.length === 0 || tenses.length === 0) return null;

        let tries = 0;
        while (tries < 20) {  // try up to 20 times to avoid infinite loops
            const v = verbs[Math.floor(Math.random() * verbs.length)];
            const t = tenses[Math.floor(Math.random() * tenses.length)];
            const s = subjects[Math.floor(Math.random() * subjects.length)];
            const key = getKey(v, t, s.i);
            if (!recentKeys.includes(key)) {
                recentKeys.push(key);
                if (recentKeys.length > 5) recentKeys.shift();  // keep last 5
                const card = getCard(v, t, s.i);
                return {v, t, s, card};
            }
            tries++;
        }

        // fallback if all recent keys were selected
        const v = verbs[Math.floor(Math.random() * verbs.length)];
        const t = tenses[Math.floor(Math.random() * tenses.length)];
        const s = subjects[Math.floor(Math.random() * subjects.length)];
        const card = getCard(v, t, s.i);
        return {v, t, s, card};
    }

    function updateCounter() {
        document.getElementById("counter").innerText = `Questions: ${totalQuestions} | Correct: ${correctAnswers}`;
    }

    function updateSRS(card, correct) {
        if (correct) {
            card.interval = Math.round(card.interval * card.ease);
            card.ease += 0.1;
        } else {
            card.interval = 1;
            card.ease = Math.max(1.3, card.ease - 0.2);
        }
        localStorage.setItem("srs", JSON.stringify(srs));
    }

    function nextQ() {
        document.getElementById("fullConjugation").style.display = "none";
        document.getElementById("toggleConjugationBtn").innerText = "Show full conjugation";
        const verbs = getSelectedVerbs(), tenses = getSelectedTenses();
        if (verbs.length === 0 || tenses.length === 0) {
            document.getElementById("question").innerText = "Select at least one verb and one tense";
            return;
        }
        const item = pickCard(verbs, tenses);
        if (!item) {
            document.getElementById("question").innerText = "🎉 Nothing due!";
            return;
        }
        current = item;
        const template = sentenceTemplates[item.t][Math.floor(Math.random() * sentenceTemplates[item.t].length)];
        document.getElementById("question").innerHTML = template.replace("___", item.s.p + " ... (" + item.v + ") <span class='tense'>[" + tenseLabels[item.t] + "]</span>");
        document.getElementById("answer").value = "";
        document.getElementById("feedback").innerText = "";
        setTimeout(() => document.getElementById("answer").focus(), 0);
    }

    function check() {
        if (!current || !current.v)
            return "wrong";

        let user = document.getElementById("answer").value.trim().toLowerCase();
        let correct = conjugate(current.v, current.t, current.s.i);
        let okStrict = user === correct;
        let okLoose = normalizeAccents(user) === normalizeAccents(correct);
        const dutch = getDutchTranslation(current.v, current.t, current.s.i);

        if (okStrict) {
            document.getElementById("feedback").innerHTML = `<span class='good'>Correct</span><br><i>Dutch: ${dutch}</i>`;
        } else if (okLoose) {
            document.getElementById("feedback").innerHTML = `<span class='good'>Almost correct — check accent: <b>${correct}</b></span><br><i>Dutch: ${dutch}</i>`;
        } else {
            document.getElementById("feedback").innerHTML = `<span class='bad'>Wrong → <b>${correct}</b></span><br><i>Dutch: ${dutch}</i>`;
        }

        updateSRS(current.card, okStrict || okLoose);
        totalQuestions++;
        if (okStrict || okLoose)
            correctAnswers++;
        updateCounter();

        if (okStrict)
            return "correct";
        if (okLoose)
            return "almost";
        return "wrong";
    }

    function selectRegularVerbs() {
        const cbs = document.querySelectorAll("#verbSelector input");
        cbs.forEach(cb => cb.checked = !irregularVerbs.includes(cb.value));
        getSelected("verbSelector", "selectedVerbs");
    }

    function selectIrregularVerbs() {
        const cbs = document.querySelectorAll("#verbSelector input");
        cbs.forEach(cb => cb.checked = irregularVerbs.includes(cb.value));
        getSelected("verbSelector", "selectedVerbs");
    }

    function toggleFullConjugation() {
        const el = document.getElementById("fullConjugation");

        if (el.style.display === "none") {

            const allTenses = Object.keys(tenseLabels);

            let html = "";

            allTenses.forEach(t => {
                html += `<br><b>${tenseLabels[t]}</b><br>`;

                subjects.forEach(s => {
                    const es = conjugate(current.v, t, s.i);
                    html += `${s.p}: ${es}<br>`;
                });
            });

            el.innerHTML = html;
            el.style.display = "block";
            document.getElementById("toggleConjugationBtn").innerText = "Hide full conjugation";

        } else {
            el.style.display = "none";
            document.getElementById("toggleConjugationBtn").innerText = "Show full conjugation";
        }
    }

    function getDutchTranslation(v, t, p) {
        const entry = dutchDict[v];
        if (!entry) return "(geen vertaling)";

        const subj = ["ik", "jij", "hij", "wij", "jullie", "zij"];
        const refl = ["me", "je", "zich", "ons", "je", "zich"];

        let base = entry.inf;
        let prefix = entry.prefix || ""; // for separable verbs
        let isSeparable = entry.separable || false;
        let isReflexive = entry.reflexive || false;

        // --- Dutch present tense irregulars ---
        const presentIrregular = {
            zijn:   ["ben","bent","is","zijn","zijn","zijn"],
            hebben: ["heb","hebt","heeft","hebben","hebben","hebben"],
            gaan:   ["ga","gaat","gaat","gaan","gaan","gaan"],
            komen:  ["kom","komt","komt","komen","komen","komen"],
            zien:   ["zie","ziet","ziet","zien","zien","zien"],
            doen:   ["doe","doet","doet","doen","doen","doen"],
            staan:  ["sta","staat","staat","staan","staan","staan"],
            spreken: ["spreek","spreekt","spreekt","spreken","spreken","spreken"],
            eten:   ["eet","eet","eet","eten","eten","eten"],
            schrijven: ["schrijf","schrijft","schrijft","schrijven","schrijven","schrijven"],
            geven: ["geef","geeft","geeft","geven","geven","geven"],
            willen: ["wil","wilt","wilt","willen","willen","willen"]
        };

        // --- Dutch past participles (perfect) ---
        const pastPart = {
            zijn: "geweest",
            hebben: "gehad",
            gaan: "gegaan",
            komen: "gekomen",
            zien: "gezien",
            doen: "gedaan",
            staan: "gestaan",
            spreken: "gesproken",
            eten: "gegeten",
            schrijven: "geschreven",
            geven: "gegeven"
        };

        function presentForm() {
            if (presentIrregular[base]) return presentIrregular[base][p];
            // regular verbs: stem + ending
            const stem = base.replace(/en$/, "");
            const endings = ["", "t", "t", "en", "en", "en"];
            return stem + endings[p];
        }

        function pastParticipleForm() {
            let part = pastPart[base] || ("ge" + base.replace(/en$/, "") + "d");
            if (isSeparable) part = prefix + part;
            return part;
        }

        // --- Construct translation per tense ---
        if (t === "present") {
            let verb = presentForm();
            if (isSeparable) verb += " " + prefix;
            if (isReflexive) return subj[p] + " " + verb + " " + refl[p];
            return subj[p] + " " + verb;
        }

        if (t === "perfecto") {
            const auxZijn = ["gaan", "komen", "zijn", "blijven", "staan"];
            const aux = auxZijn.includes(base)
                ? ["ben","bent","is","zijn","zijn","zijn"]
                : ["heb","hebt","heeft","hebben","hebben","hebben"];
            let part = pastParticipleForm();
            if (isReflexive) return subj[p] + " " + aux[p] + " " + refl[p] + " " + part;
            return subj[p] + " " + aux[p] + " " + part;
        }

        if (t === "indefinido" || t === "imperfecto") {
            const pastIrregular = {
                eten: ["at","at","at","aten","aten","aten"],
                zijn: ["was","was","was","waren","waren","waren"],
                hebben: ["had","had","had","hadden","hadden","hadden"],
                gaan: ["ging","ging","ging","gingen","gingen","gingen"],
                komen: ["kwam","kwam","kwam","kwamen","kwamen","kwamen"],
                zien: ["zag","zag","zag","zagen","zagen","zagen"],
                doen: ["deed","deed","deed","deden","deden","deden"],
                staan: ["stond","stond","stond","stonden","stonden","stonden"],
                spreken: ["sprak","sprak","sprak","spraken","spraken","spraken"],
                eten: ["at","at","at","aten","aten","aten"],
                schrijven: ["schreef","schreef","schreef","schreven","schreven","schreven"],
                geven: ["gaf","gaf","gaf","gaven","gaven","gaven"],
                willen: ["wilde","wilde","wilde","wilden","wilden","wilden"]
            };
            if (pastIrregular[base]) return subj[p] + " " + pastIrregular[base][p];
            // default regular past
            const stem = base.replace(/en$/, "");
            const past = (p < 3) ? stem + "de" : stem + "den";
            return subj[p] + " " + past;
        }

        if (t === "gerundio") {
            const aux = ["ben","bent","is","zijn","zijn","zijn"];
            let verb = "aan het " + base;
            if (isReflexive) verb = "zich " + verb;
            return subj[p] + " " + aux[p] + " " + verb;
        }

        return subj[p] + " " + base;
    }

    // initial render
    renderCheckboxes("verbSelector", getVerbList(), "selectedVerbs");
    const tensesForCheckbox = Object.keys(tenseLabels).map(key => ({v: key, l: tenseLabels[key]}));
    renderCheckboxes("tenseSelector", tensesForCheckbox, "selectedTenses");

    // --- ADD ENTER KEY HANDLER HERE ---
    const answerInput = document.getElementById("answer");
    answerInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            const result = check(); // "correct", "almost", or "wrong"
            let delay = 1000; // default for correct
            if (result === "correct")
                delay = 1000;
            else if (result === "almost")
                delay = 2000;
            else if (result === "wrong")
                delay = 6000;

            setTimeout(nextQ, delay);
        }
    });

</script>
