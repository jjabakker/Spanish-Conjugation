<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish Trainer v7</title>
    <style>
        body {
            font-family: Arial, serif;
            max-width: 800px;
            margin: auto;
            padding: 30px;
            font-size: 22px;
            line-height: 1.5;
        }

        h2 {
            font-size: 26px;
        }

        h3 {
            font-size: 30px;
            font-weight: bold;
            margin: 25px 0;
        }

        input, button {
            padding: 14px;
            width: 100%;
            margin: 10px 0;
            font-size: 22px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #f2f2f2;
        }

        .good {
            color: green;
            font-size: 26px;
        }

        .bad {
            color: red;
            font-size: 26px;
        }

        .meta, #counter {
            font-size: 18px;
            color: gray;
        }

        .tense {
            font-size: 16px;
            color: gray;
            margin-left: 10px;
        }

        #verbSelector {
            column-count: 2;
            column-gap: 20px;
        }

        #verbSelector label {
            display: block;
            margin-bottom: 5px;
        }

        #tenseSelector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 20px;
            margin-top: 10px;
        }

        .selector-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .selector-buttons button {
            padding: 6px;
            font-size: 16px;
            width: auto;
        }

        label {
            display: flex;
            align-items: center;
        }

        label input[type="checkbox"] {
            margin-right: 8px;
            width: auto;
        }
    </style>
</head>
<body>

<h2>Spanish Trainer v7</h2>

<input id="verbs" value="
aparecer, aprender, abrir, comer, conocer, caber, dar, dejar, decidir, decir, dormir, entender, escribir, estar, girar, haber, hacer, hablar, ir, jugar, levantar, levantarse, poner, poder, romper, saber, sentir, ser, traer, venir, ver, vestirse, vivir, volver, salir, querer"
       style="display:none;">

<button onclick="toggleVerbSelector()">Select verbs</button>
<div id="verbSelectorContainer" style="display:none; margin-bottom:15px;">
    <div class="selector-buttons">
        <button onclick="selectAll('verbSelector','selectedVerbs')">Select All</button>
        <button onclick="selectNone('verbSelector','selectedVerbs')">Select None</button>
    </div>
    <div id="verbSelector"></div>
</div>

<button onclick="toggleTenseSelector()">Select tenses</button>
<div id="tenseSelectorContainer" style="display:none; margin-bottom:15px;">
    <div class="selector-buttons">
        <button onclick="selectAll('tenseSelector','selectedTenses')">Select All</button>
        <button onclick="selectNone('tenseSelector','selectedTenses')">Select None</button>
    </div>
    <div id="tenseSelector"></div>
</div>

<button onclick="nextQ()">Next Question</button>

<h3 id="question"></h3>
<input id="answer" placeholder="Type answer">
<button onclick="check()">Check</button>
<button id="toggleConjugationBtn" onclick="toggleFullConjugation()">Show full conjugation</button>

<p id="fullConjugation" class="meta" style="display:none;"></p>
<p id="feedback"></p>
<p class="meta" id="counter">Questions: 0 | Correct: 0</p>

<script>
    const tenseLabels = {
        present: "Presente",
        perfecto: "Pretérito Perfecto",
        indefinido: "Pretérito Indefinido",
        imperfecto: "Pretérito Imperfecto",
        gerundio: "Gerundio"
    };
    const subjects = [{p: "yo", i: 0}, {p: "tú", i: 1}, {p: "él", i: 2}, {p: "nosotros", i: 3}, {
        p: "vosotros",
        i: 4
    }, {p: "ellos", i: 5}];
    const haber = ["he", "has", "ha", "hemos", "habéis", "han"];
    const estarForms = ["estoy", "estás", "está", "estamos", "estáis", "están"];
    const sentenceTemplates = {
        present: ["Hoy ___", "Siempre ___"],
        perfecto: ["Hoy ___", "Esta semana ___"],
        indefinido: ["Ayer ___", "Anoche ___"],
        imperfecto: ["Antes ___", "Cuando era joven ___"],
        gerundio: ["Ahora ___", "En este momento ___"]
    };
    const irregulars = {};
    const irregularParticiples = {};



    // --- your irregulars and dutchTranslationsTense definitions go here (copy from your previous code) ---
    // to save space, assume they are pasted here exactly as in your HTML

    function participle(v) {
        return irregularParticiples[v] || (v.endsWith("ar") ? v.slice(0, -2) + "ado" : v.slice(0, -2) + "ido");
    }

    function gerund(v) {
        return v.endsWith("ar") ? v.slice(0, -2) + "ando" : v.slice(0, -2) + "iendo";
    }

    function normalizeAccents(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ñ/g, "n");
    }

    function conjugate(v, t, p) {
        if (t === "perfecto") return haber[p] + " " + participle(v);
        if (t === "gerundio") return estarForms[p] + " " + gerund(v);
        if (irregulars[v] && irregulars[v][t]) return irregulars[v][t][p];
        let stem = v.slice(0, -2), end = v.slice(-2), endings = {
            present: {
                ar: ["o", "as", "a", "amos", "áis", "an"],
                er: ["o", "es", "e", "emos", "éis", "en"],
                ir: ["o", "es", "e", "imos", "ís", "en"]
            },
            indefinido: {
                ar: ["é", "aste", "ó", "amos", "asteis", "aron"],
                er: ["í", "iste", "ió", "imos", "isteis", "ieron"],
                ir: ["í", "iste", "ió", "imos", "isteis", "ieron"]
            },
            imperfecto: {
                ar: ["aba", "abas", "aba", "ábamos", "abais", "aban"],
                er: ["ía", "ías", "ía", "íamos", "íais", "ían"],
                ir: ["ía", "ías", "ía", "íamos", "íais", "ían"]
            }
        };
        return stem + endings[t][end][p];
    }

    function renderCheckboxes(containerId, items, storageKey) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        let saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
        items.forEach(i => {
            const value = i.v || i;
            const checked = saved.includes(value);
            const label = document.createElement("label");
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.value = value;
            cb.checked = checked;
            cb.addEventListener("change", () => getSelected(containerId, storageKey));
            label.appendChild(cb);
            label.appendChild(document.createTextNode(" " + (i.l || i)));
            container.appendChild(label);
        });
    }

    function getSelected(containerId, storageKey) {
        const cbs = document.querySelectorAll(`#${containerId} input[type=checkbox]`);
        const selected = Array.from(cbs).filter(cb => cb.checked).map(cb => cb.value);
        localStorage.setItem(storageKey, JSON.stringify(selected));
        return selected;
    }

    function getSelectedVerbs() {
        return getSelected("verbSelector", "selectedVerbs");
    }

    function getSelectedTenses() {
        return getSelected("tenseSelector", "selectedTenses");
    }

    function selectAll(containerId, storageKey) {
        document.querySelectorAll(`#${containerId} input`).forEach(cb => cb.checked = true);
        getSelected(containerId, storageKey);
    }

    function selectNone(containerId, storageKey) {
        document.querySelectorAll(`#${containerId} input`).forEach(cb => cb.checked = false);
        getSelected(containerId, storageKey);
    }

    function toggleVerbSelector() {
        const c = document.getElementById("verbSelectorContainer");
        c.style.display = c.style.display === "none" ? "block" : "none";
        renderCheckboxes("verbSelector", getVerbList(), "selectedVerbs");
    }

    function toggleTenseSelector() {
        const c = document.getElementById("tenseSelectorContainer");
        c.style.display = c.style.display === "none" ? "block" : "none";
        const tensesForCheckbox = Object.keys(tenseLabels).map(key => ({v: key, l: tenseLabels[key]}));
        renderCheckboxes("tenseSelector", tensesForCheckbox, "selectedTenses");
    }

    function getVerbList() {
        return document.getElementById("verbs").value.split(",").map(v => v.trim()).filter(v => v.length > 0);
    }

    let srs = JSON.parse(localStorage.getItem("srs") || "{}"), current = {}, totalQuestions = 0, correctAnswers = 0;

    function getKey(v, t, p) {
        return v + "|" + t + "|" + p;
    }

    function getCard(v, t, p) {
        let k = getKey(v, t, p);
        if (!srs[k]) srs[k] = {ease: 2.5, interval: 1, due: 0};
        return srs[k];
    }

    function pickCard(verbs, tenses) {
        if (verbs.length === 0 || tenses.length === 0) return null;
        const v = verbs[Math.floor(Math.random() * verbs.length)];
        const t = tenses[Math.floor(Math.random() * tenses.length)];
        const s = subjects[Math.floor(Math.random() * subjects.length)];
        const card = getCard(v, t, s.i);
        return {v, t, s, card};
    }

    function updateCounter() {
        document.getElementById("counter").innerText = `Questions: ${totalQuestions} | Correct: ${correctAnswers}`;
    }

    function updateSRS(card, correct) {
        if (correct) {
            card.interval = Math.round(card.interval * card.ease);
            card.ease += 0.1;
        } else {
            card.interval = 1;
            card.ease = Math.max(1.3, card.ease - 0.2);
        }
        localStorage.setItem("srs", JSON.stringify(srs));
    }

    function nextQ() {
        document.getElementById("fullConjugation").style.display = "none";
        document.getElementById("toggleConjugationBtn").innerText = "Show full conjugation";
        const verbs = getSelectedVerbs(), tenses = getSelectedTenses();
        if (verbs.length === 0 || tenses.length === 0) {
            document.getElementById("question").innerText = "Select at least one verb and one tense";
            return;
        }
        const item = pickCard(verbs, tenses);
        if (!item) {
            document.getElementById("question").innerText = "🎉 Nothing due!";
            return;
        }
        current = item;
        const template = sentenceTemplates[item.t][Math.floor(Math.random() * sentenceTemplates[item.t].length)];
        document.getElementById("question").innerHTML = template.replace("___", item.s.p + " ... (" + item.v + ") <span class='tense'>[" + tenseLabels[item.t] + "]</span>");
        document.getElementById("answer").value = "";
        document.getElementById("feedback").innerText = "";
        setTimeout(() => document.getElementById("answer").focus(), 0);
    }

    function check() {
        if (!current || !current.v) return;
        let user = document.getElementById("answer").value.trim().toLowerCase();
        let correct = conjugate(current.v, current.t, current.s.i);
        let okStrict = user === correct;
        let okLoose = normalizeAccents(user) === normalizeAccents(correct);
        const dutch = getDutchTranslation(current.v, current.t, current.s.i);
        if (okStrict) document.getElementById("feedback").innerHTML = `<span class='good'>Correct</span><br><i>Dutch: ${dutch}</i>`;
        else if (okLoose) document.getElementById("feedback").innerHTML = `<span class='good'>Almost correct — check accent: <b>${correct}</b></span><br><i>Dutch: ${dutch}</i>`;
        else document.getElementById("feedback").innerHTML = `<span class='bad'>Wrong → <b>${correct}</b></span><br><i>Dutch: ${dutch}</i>`;
        updateSRS(current.card, okStrict || okLoose);
        totalQuestions++;
        if (okStrict || okLoose) correctAnswers++;
        updateCounter();
        setTimeout(nextQ, okStrict ? 1000 : okLoose ? 3000 : 10000);
    }

    function toggleFullConjugation() {
        const el = document.getElementById("fullConjugation");
        if (el.style.display === "none") {
            const all = subjects.map(s => s.p + ": " + conjugate(current.v, current.t, s.i)).join("<br>");
            el.innerHTML = all;
            el.style.display = "block";
            document.getElementById("toggleConjugationBtn").innerText = "Hide full conjugation";
        } else {
            el.style.display = "none";
            document.getElementById("toggleConjugationBtn").innerText = "Show full conjugation";
        }
    }

    const dutchDict = {
        aparecer: "verschijnen",
        aprender: "leren",
        abrir: "openen",
        comer: "eten",
        conocer: "kennen",
        caber: "passen",
        dar: "geven",
        dejar: "laten",
        decidir: "beslissen",
        decir: "zeggen",
        dormir: "slapen",
        entender: "begrijpen",
        escribir: "schrijven",
        estar: "zijn",
        girar: "draaien",
        haber: "hebben",
        hacer: "doen",
        hablar: "spreken",
        ir: "gaan",
        jugar: "spelen",
        levantar: "optillen",
        levantarse: "opstaan",
        poner: "zetten",
        poder: "kunnen",
        romper: "breken",
        saber: "weten",
        sentir: "voelen",
        ser: "zijn",
        traer: "brengen",
        venir: "komen",
        ver: "zien",
        vestirse: "aankleden",
        vivir: "leven",
        volver: "terugkomen",
        salir: "vertrekken",
        querer: "willen"
    };

    function getDutchTranslation(v, t, p){
        const inf = dutchDict[v];
        if(!inf) return "(geen vertaling)";

        const subj = ["ik","jij","hij","wij","jullie","zij"];
        let stem = inf.replace("en","");

        const irregular = {
            zijn: ["ben","bent","is","zijn","zijn","zijn"],
            hebben: ["heb","hebt","heeft","hebben","hebben","hebben"],
            gaan: ["ga","gaat","gaat","gaan","gaan","gaan"],
            komen: ["kom","komt","komt","komen","komen","komen"],
            zien: ["zie","ziet","ziet","zien","zien","zien"],
            doen: ["doe","doet","doet","doen","doen","doen"],
            willen: ["wil","wil","wil","willen","willen","willen"],
            kunnen: ["kan","kunt","kan","kunnen","kunnen","kunnen"]
        };

        // PRESENT
        if(t === "present"){
            if(irregular[inf]) return subj[p] + " " + irregular[inf][p];
            const endings = ["", "t", "t", "en", "en", "en"];
            return subj[p] + " " + stem + endings[p];
        }

        // PERFECT
        if(t === "perfecto"){
            const auxZijn = ["gaan","komen","zijn","blijven"];
            const aux = auxZijn.includes(inf)
                ? ["ben","bent","is","zijn","zijn","zijn"]
                : ["heb","hebt","heeft","hebben","hebben","hebben"];

            let part = "ge" + stem + "d";

            const irregularPart = {
                eten:"gegeten",
                schrijven:"geschreven",
                zien:"gezien",
                komen:"gekomen",
                gaan:"gegaan",
                doen:"gedaan",
                geven:"gegeven"
            };

            if(irregularPart[inf]) part = irregularPart[inf];

            return subj[p] + " " + aux[p] + " " + part;
        }

        // GERUND
        if(t === "gerundio"){
            const aux = ["ben","bent","is","zijn","zijn","zijn"];
            return subj[p] + " " + aux[p] + " aan het " + inf;
        }

        return subj[p] + " " + inf;
    }


    // initial render
    renderCheckboxes("verbSelector", getVerbList(), "selectedVerbs");
    const tensesForCheckbox = Object.keys(tenseLabels).map(key => ({v: key, l: tenseLabels[key]}));
    renderCheckboxes("tenseSelector", tensesForCheckbox, "selectedTenses");
</script>
</body>
</html>
