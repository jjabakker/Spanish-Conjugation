<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <title>Spanish Trainer v7</title>
    <style>
        /* Basic page styling */
        body {
            font-family: Arial, serif;
            max-width: 800px;
            margin: auto;
            padding: 30px;
            font-size: 22px;
            line-height: 1.5;
        }

        h2 { font-size: 26px; }
        h3 { font-size: 30px; font-weight: bold; margin: 25px 0; }

        /* Inputs and buttons styling */
        input, button {
            padding: 14px;
            width: 100%;
            margin: 10px 0;
            font-size: 22px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button { cursor: pointer; font-weight: bold; }
        button:hover { background-color: #f2f2f2; }

        /* Feedback text styling */
        .good { color: green; font-size: 26px; }
        .bad { color: red; font-size: 26px; }

        .meta, #counter { font-size: 18px; color: gray; }
        .tense { font-size: 16px; color: gray; margin-left: 10px; }

        /* Verb selector layout */
        #verbSelector { column-count: 2; column-gap: 20px; }
        #verbSelector label { display: block; margin-bottom: 5px; }

        /* Tense selector layout (grid of checkboxes) */
        #tenseSelector {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 5px 20px;
            margin-top: 10px;
        }

        /* Button group inside selectors */
        .selector-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .selector-buttons button { padding: 6px; font-size: 16px; width: auto; }

        /* Label + checkbox styling */
        label { display: flex; align-items: center; }
        label input[type="checkbox"] { margin-right: 8px; width: auto; }
    </style>
</head>

<h2>Spanish Verb Trainer v7</h2>

<!-- Verb selector toggle button -->
<button onclick="toggleVerbSelector()">Select verbs</button>
<div id="verbSelectorContainer" style="display:none; margin-bottom:15px;">
    <div class="selector-buttons">
        <button onclick="selectAll('verbSelector','selectedVerbs')">Select All</button>
        <button onclick="selectNone('verbSelector','selectedVerbs')">Select None</button>
        <button onclick="selectRegularVerbs()">Regular</button>
        <button onclick="selectIrregularVerbs()">Irregular</button>
    </div>
    <div id="verbSelector"></div> <!-- dynamically populated checkboxes -->
</div>

<!-- Tense selector toggle button -->
<button onclick="toggleTenseSelector()">Select tenses</button>
<div id="tenseSelectorContainer" style="display:none; margin-bottom:15px;">
    <div class="selector-buttons">
        <button onclick="selectAll('tenseSelector','selectedTenses')">Select All</button>
        <button onclick="selectNone('tenseSelector','selectedTenses')">Select None</button>
    </div>
    <div id="tenseSelector"></div> <!-- dynamically populated checkboxes -->
</div>

<!-- Controls for quiz -->
<button onclick="nextQ()">Next Question</button>

<h3 id="question"></h3>
<input id="answer" placeholder="Type answer">
<button onclick="check()">Check</button>
<button id="toggleConjugationBtn" onclick="toggleFullConjugation()">Show full conjugation</button>

<p id="fullConjugation" class="meta" style="display:none;"></p>
<p id="feedback"></p>
<p class="meta" id="counter">Questions: 0 | Correct: 0</p>

    // ---------- Conjugation helper functions ----------

    // Returns participle of verb (irregular if defined)
    function participle(verb) {
        const base = verb.endsWith("se") ? verb.slice(0, -2) : verb;

        const verbObj =
            verbs.find(v => v.name === verb) ||
            verbs.find(v => v.name === base);

        if (verbObj?.participle) {
            return verbObj.participle;
        }

        if (base.endsWith("ar")) return base.slice(0, -2) + "ado";
        if (base.endsWith("er") || base.endsWith("ir")) return base.slice(0, -2) + "ido";

        return base;
    }

    // participle("acostarse");

    // Returns gerund of verb (irregular if defined)
    function gerund(v) {
        const base = v.endsWith("se") ? v.slice(0, -2) : v;
        const verbObj = verbs.find(verb => verb.name === v);
        if (verbObj?.gerund) return verbObj.gerund;
        return base.endsWith("ar") ? base.slice(0, -2) + "ando" : base.slice(0, -2) + "iendo";
    }

    // Normalize accents for loose comparison
    function normalizeAccents(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ñ/g, "n");
    }

    // Render checkboxes dynamically
    function renderCheckboxes(containerId, items, storageKey) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        let saved = JSON.parse(localStorage.getItem(storageKey) || "null");
        items.forEach(i => {
            const value = i.v || i;
            const checked = saved === null ? true : saved.includes(value);
            const label = document.createElement("label");
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.value = value;
            cb.checked = checked;
            cb.addEventListener("change", () => getSelected(containerId, storageKey));
            label.appendChild(cb);
            label.appendChild(document.createTextNode(" " + (i.l !== undefined ? i.l : i.v)));
            container.appendChild(label);
        });
    }

    // Save selected checkboxes to localStorage and return arrays
    function getSelected(containerId, storageKey) {
        const cbs = document.querySelectorAll(`#${containerId} input[type=checkbox]`);
        const selected = Array.from(cbs).filter(cb => cb.checked).map(cb => cb.value);
        localStorage.setItem(storageKey, JSON.stringify(selected));
        return selected;
    }

    }

    function selectRegularVerbs() {
        const cbs = document.querySelectorAll("#verbSelector input");
        cbs.forEach(cb => {
            const verb = verbs.find(v => v.name === cb.value);
            cb.checked = verb && !isVerbIrregular(verb);  // use the new function
        });
        getSelected("verbSelector", "selectedVerbs");
    }

    function selectIrregularVerbs() {
        const cbs = document.querySelectorAll("#verbSelector input");
        cbs.forEach(cb => {
            const verb = verbs.find(v => v.name === cb.value);
            cb.checked = verb && isVerbIrregular(verb);  // use the new function
        });
        getSelected("verbSelector", "selectedVerbs");
    }


    function isVerbIrregular(verb) {
        // A verb is irregular if it has a participle, gerund, or appears in the irregulars table
        return !!(verb.participle || verb.gerund || irregulars[verb.name]);
    }

    // ---------- Quiz logic ----------

    function nextQ() {
        answered = false;

        document.getElementById("fullConjugation").style.display = "none";
        document.getElementById("toggleConjugationBtn").innerText = "Show full conjugation";
        const verbs = getSelectedVerbs(), tenses = getSelectedTenses();
        if (verbs.length === 0 || tenses.length === 0) {
            document.getElementById("question").innerText = "Select at least one verb and one tense";
            return;
        }
        const item = pickCard(verbs, tenses);
        if (!item) {
            document.getElementById("question").innerText = "🎉 Nothing due!";
            return;
        }
        current = item;
        const template = sentenceTemplates[item.t][Math.floor(Math.random() * sentenceTemplates[item.t].length)];
        document.getElementById("question").innerHTML = template.replace("___", item.s.p + " ... (" + item.v + ") <span class='tense'>[" + tenseLabels[item.t] + "]</span>");
        document.getElementById("answer").value = "";
        document.getElementById("feedback").innerText = "";
        setTimeout(() => document.getElementById("answer").focus(), 0);
    }

    function check() {

        answered = true;
        if (!current || !current.v)
            return "wrong";

        let user = document.getElementById("answer").value.trim().toLowerCase();
        let correct = conjugate(current.v, current.t, current.s.i);

        // --- NEW: automatic irregular detection ---
        let irregular = isIrregularForm(current.v, current.t, current.s.i);
        let colored = irregular
            ? `<span style="color:orange"><b>${correct}</b></span>`
            : `<b>${correct}</b>`;

        let okStrict = user === correct;
        let okLoose = normalizeAccents(user) === normalizeAccents(correct);
        const dutch = verbs.find(v => v.name === current.v)?.dutch || "(geen vertaling)";

        if (okStrict) {
            document.getElementById("feedback").innerHTML =
                `<span class='good'>Correct</span><br><i>Dutch: ${dutch}</i>`;
        } else if (okLoose) {
            document.getElementById("feedback").innerHTML =
                `<span class='good'>Almost correct — check accent: ${colored}</span><br><i>Dutch: ${dutch}</i>`;
        } else {
            document.getElementById("feedback").innerHTML =
                `<span class='bad'>Wrong → ${colored}</span><br><i>Dutch: ${dutch}</i>`;
        }

        updateSRS(current.card, okStrict || okLoose);
        totalQuestions++;
        if (okStrict || okLoose)
            correctAnswers++;
        updateCounter();

        if (okStrict)
            return "correct";
        if (okLoose)
            return "almost";
        return "wrong";
    }

    function getSelectedVerbs() {
        return getSelected("verbSelector", "selectedVerbs");
    }

    function getSelectedTenses() {
        return getSelected("tenseSelector", "selectedTenses");
    }

    // ---------- Conjugate ----------

    function conjugate(v, t, p) {
        if (t === "perfecto")
            return haber[p] + " " + participle(v);
        if (t === "gerundio")
            return estar[p] + " " + gerund(v);
        if (irregulars[v] && irregulars[v][t])
            return irregulars[v][t][p];
        let stem = v.slice(0, -2), end = v.slice(-2), endings = {
            present: {
                ar: ["o", "as", "a", "amos", "áis", "an"],
                er: ["o", "es", "e", "emos", "éis", "en"],
                ir: ["o", "es", "e", "imos", "ís", "en"]
            },
            indefinido: {
                ar: ["é", "aste", "ó", "amos", "asteis", "aron"],
                er: ["í", "iste", "ió", "imos", "isteis", "ieron"],
                ir: ["í", "iste", "ió", "imos", "isteis", "ieron"]
            },
            imperfecto: {
                ar: ["aba", "abas", "aba", "ábamos", "abais", "aban"],
                er: ["ía", "ías", "ía", "íamos", "íais", "ían"],
                ir: ["ía", "ías", "ía", "íamos", "íais", "ían"]
            }
        };
        return stem + endings[t][end][p];
    }

    function conjugateRegular(v, t, p) {
        if (t === "perfecto") {
            const part = v.endsWith("ar")
                ? v.slice(0, -2) + "ado"
                : v.slice(0, -2) + "ido";
            return haber[p] + " " + part;
        }

        if (t === "gerundio") {
            const g = v.endsWith("ar")
                ? v.slice(0, -2) + "ando"
                : v.slice(0, -2) + "iendo";
            return estar[p] + " " + g;
        }

        let stem = v.slice(0, -2), end = v.slice(-2);

        const endings = {
            present: {
                ar: ["o", "as", "a", "amos", "áis", "an"],
                er: ["o", "es", "e", "emos", "éis", "en"],
                ir: ["o", "es", "e", "imos", "ís", "en"]
            },
            indefinido: {
                ar: ["é", "aste", "ó", "amos", "asteis", "aron"],
                er: ["í", "iste", "ió", "imos", "isteis", "ieron"],
                ir: ["í", "iste", "ió", "imos", "isteis", "ieron"]
            },
            imperfecto: {
                ar: ["aba", "abas", "aba", "ábamos", "abais", "aban"],
                er: ["ía", "ías", "ía", "íamos", "íais", "ían"],
                ir: ["ía", "ías", "ía", "íamos", "íais", "ían"]
            }
        };

        return stem + endings[t][end][p];
    }

    function isIrregularForm(verbName, tense, person) {
        const verb = verbs.find(v => v.name === verbName);
        if (!verb)
            return false;

        // Check specific form vs regular
        if (irregulars[verbName] && irregulars[verbName][tense]) {
            const irregularForm = irregulars[verbName][tense][person];
            const regularForm = conjugateRegular(verbName, tense, person);

            if (irregularForm !== regularForm) {
                return true;
            }
        }

        // Check participle / gerund
        if (tense === "perfecto" && verb.participle) return true;
        if (tense === "gerundio" && verb.gerund) return true;

        return false;
    }


    function getDutchTranslation(verbName) {
        const v = verbs.find(v => v.name === verbName);
        return v ? v.dutch : "(geen vertaling)";
    }


    function getVerbList() {
        return verbs;
    }

    let srs = JSON.parse(localStorage.getItem("srs") || "{}"), current = {}, totalQuestions = 0, correctAnswers = 0;

    function getKey(v, t, p) {
        return v + "|" + t + "|" + p;
    }

    function getCard(v, t, p) {
        let k = getKey(v, t, p);
        if (!srs[k]) srs[k] =
            {ease: 2.5, interval: 1, due: 0};
        return srs[k];
    }

    let recentKeys = [];   // add this at the top, next to `current`

    function pickCard(verbs, tenses) {
        if (verbs.length === 0 || tenses.length === 0)
            return null;

        let tries = 0;
        while (tries < 20) {  // try up to 20 times to avoid infinite loops
            const v = verbs[Math.floor(Math.random() * verbs.length)];
            const t = tenses[Math.floor(Math.random() * tenses.length)];
            const s = subjects[Math.floor(Math.random() * subjects.length)];
            const key = getKey(v, t, s.i);
            if (!recentKeys.includes(key)) {
                recentKeys.push(key);
                if (recentKeys.length > 5)
                    recentKeys.shift();  // keep last 5
                const card = getCard(v, t, s.i);
                return {v, t, s, card};
            }
            tries++;
        }

        // fallback if all recent keys were selected
        const v = verbs[Math.floor(Math.random() * verbs.length)];
        const t = tenses[Math.floor(Math.random() * tenses.length)];
        const s = subjects[Math.floor(Math.random() * subjects.length)];
        const card = getCard(v, t, s.i);
        return {v, t, s, card};
    }

    function updateCounter() {
        document.getElementById("counter").innerText = `Questions: ${totalQuestions} | Correct: ${correctAnswers}`;
    }

    function updateSRS(card, correct) {
        if (correct) {
            card.interval = Math.round(card.interval * card.ease);
            card.ease += 0.1;
        } else {
            card.interval = 1;
            card.ease = Math.max(1.3, card.ease - 0.2);
        }
        localStorage.setItem("srs", JSON.stringify(srs));
    }


    function toggleFullConjugation() {
        const el = document.getElementById("fullConjugation");

        if (el.style.display === "none") {
            let html = `<table style="border-collapse: collapse; width: 100%; font-family: monospace;">`;

            // short headers
            const shortLabels = {
                present:    "Presente",
                perfecto:   "Perfecto",
                indefinido: "Indefinido",
                imperfecto: "Imperfect",
                gerundio:   "Gerundio"
            };

            // header row
            html += `<tr><th style="padding:2px 6px;"></th>`;
            Object.keys(tenseLabels).forEach(t => {
                html += `<th style="padding:2px 6px; text-align:left; white-space: nowrap;">${shortLabels[t]}</th>`;
            });
            html += `</tr>`;

            // subject rows
            subjects.forEach(s => {
                html += `<tr><td style="padding:2px 6px; font-weight:bold; white-space: nowrap;">${s.p}</td>`;
                Object.keys(tenseLabels).forEach(t => {
                    let es = conjugate(current.v, t, s.i);

                    if (t === "perfecto") {
                        const verbObj = verbs.find(v => v.name === current.v);

                        if (verbObj?.participle) {
                            const parts = es.split(" "); // ["he", "comido"]
                            es = `${parts[0]} <span style="color:orange">${parts[1]}</span>`;
                        }
                    } else {
                        const irregular = isIrregularForm(current.v, t, s.i);
                        if (irregular) {
                            es = `<span style="color:orange">${es}</span>`;
                        }
                    }
                    html += `<td style="padding:2px 6px; white-space: nowrap;">${es}</td>`;
                });
                html += `</tr>`;
            });

            html += `</table>`;

            el.innerHTML = html;
            el.style.display = "block";
            document.getElementById("toggleConjugationBtn").innerText = "Hide full conjugation";
        } else {
            el.style.display = "none";
            document.getElementById("toggleConjugationBtn").innerText = "Show full conjugation";
        }
    }


    // initial render
    const savedVerbs = JSON.parse(localStorage.getItem("selectedVerbs") || "null");
    if (!savedVerbs || savedVerbs.length === 0) {
        const allVerbs = verbs.map(v => v.name);
        localStorage.setItem("selectedVerbs", JSON.stringify(allVerbs));
    }

    if (!localStorage.getItem("selectedTenses")) {
        const allTenses = Object.keys(tenseLabels);
        localStorage.setItem("selectedTenses", JSON.stringify(allTenses));
    }
    renderCheckboxes(
        "verbSelector",
        verbs.map(v => ({ v: v.name, l: v.name })),
        "selectedVerbs"
    );
    const tensesForCheckbox = Object.keys(tenseLabels).map(key => ({v: key, l: tenseLabels[key]}));
    renderCheckboxes("tenseSelector", tensesForCheckbox, "selectedTenses");


    // --- ENTER key triggers check only ---
    const answerInput = document.getElementById("answer");
    answerInput.addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            if (!answered) {
                check();
            } else {
                nextQ();
            }
        }
    });

</script>
