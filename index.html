<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Spanish Trainer v7</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: auto;
            padding: 30px;
            font-size: 22px;
            line-height: 1.5;
        }

        h2 {
            font-size: 26px;
        }

        h3 {
            font-size: 30px;
            font-weight: bold;
            margin: 25px 0;
        }

        input, button {
            padding: 14px;
            width: 100%;
            margin: 10px 0;
            font-size: 22px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #f2f2f2;
        }

        .good {
            color: green;
            font-size: 26px;
        }

        .bad {
            color: red;
            font-size: 26px;
        }

        .meta, #counter {
            font-size: 18px;
            color: gray;
        }

        .tense {
            font-size: 16px;
            color: gray;
            margin-left: 10px;
        }

        #verbSelector {
            column-count: 2; /* number of columns */
            column-gap: 20px; /* gap between columns */
        }

        #verbSelector label {
            display: block; /* each verb on its own line */
            margin-bottom: 5px;
        }

        #tenseSelector {
            display: grid;
            grid-template-columns: 1fr 1fr; /* number of columns */
            grid-auto-flow: row; /* <-- fill column first, then go to next column */
            gap: 5px 20px;
            margin-top: 10px;
        }

        .selector-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .selector-buttons button {
            padding: 6px; /* smaller padding */
            font-size: 16px; /* smaller font */
            width: auto; /* let flex sizing work */
        }

        label {
            display: flex;
            align-items: center;
        }

        label input[type="checkbox"] {
            margin-right: 8px;
            width: auto;
        }
    </style>
</head>

<body>

<h2>Spanish Trainer v7</h2>


<input id="verbs"
       value="
       aparecer,
       aprender,
       abrir,
       comer,
       conocer,
       caber,
       dar,
       dejar,
       decidir,
       decir,
       dormir,
       entender,
       escribir,
       estar,
       girar,
       haber,
       hacer,
       hablar,
       ir,
       jugar,
       levantar,
       levantarse,
       poner,
       poder,
       romper,
       saber,
       sentir,
       ser,
       traer,
       venir,
       ver,
       vestirse,
       vivir,
       volver,
       salir,
       querer" style="display:none;">

<button onclick="toggleVerbSelector()">Select verbs</button>
<div id="verbSelectorContainer" style="display:none; margin-bottom:15px;">
    <div class="selector-buttons">
        <button onclick="selectAllVerbs()">Select All</button>
        <button onclick="selectNoVerbs()">Select None</button>
    </div>
    <div id="verbSelector"></div>
</div>

<button onclick="toggleTenseSelector()">Select tenses</button>
<div id="tenseSelectorContainer" style="display:none; margin-bottom:15px;">
    <div class="selector-buttons">
        <button onclick="selectAllTenses()">Select All</button>
        <button onclick="selectNoTenses()">Select None</button>
    </div>
    <div id="tenseSelector"></div>
</div>

<button onclick="nextQ()">Next Question</button>

<h3 id="question"></h3>
<input id="answer" placeholder="Type answer">
<button onclick="check()">Check</button>
<button id="toggleConjugationBtn" onclick="toggleFullConjugation()">Show full conjugation</button>

<p id="fullConjugation" class="meta"></p>
<p id="feedback"></p>
<p class="meta" id="counter">Questions: 0 | Correct: 0</p>

<script>
    // ---------------- CONSTANTS ----------------

        indefinido: "Pretérito Indefinido",
        imperfecto: "Pretérito Imperfecto",
        gerundio: "Gerundio"
    };

    const subjects = [
        {p: "yo", i: 0}, {p: "tú", i: 1}, {p: "él", i: 2}, {p: "nosotros", i: 3}, {p: "vosotros", i: 4}, {
            p: "ellos",
            i: 5
        }
    ];
    const haber = ["he", "has", "ha", "hemos", "habéis", "han"];
    const estarForms = ["estoy", "estás", "está", "estamos", "estáis", "están"];

    const sentenceTemplates = {
        present: ["Hoy ___", "Siempre ___"],
        perfecto: ["Hoy ___", "Esta semana ___"],
        indefinido: ["Ayer ___", "Anoche ___"],
        imperfecto: ["Antes ___", "Cuando era joven ___"],
        gerundio: ["Ahora ___", "En este momento ___"]
    };

    const irregulars = {
        ser: {

            indefinido: ["fui", "fuiste", "fue", "fuimos", "fuisteis", "fueron"],
            imperfecto: ["era", "eras", "era", "éramos", "erais", "eran"]
        },
        estar: {

            imperfecto: ["estaba", "estabas", "estaba", "estábamos", "estabais", "estaban"]
        },
        dar: {

            indefinido: ["di", "diste", "dio", "dimos", "disteis", "dieron"],
            imperfecto: ["daba", "dabas", "daba", "dábamos", "dabais", "daban"]
        },

        },

        },

        },

            present:    ["escribo", "escribes", "escribe", "escribimos", "escribís", "escriben"],
            indefinido: ["escribí", "escribiste", "escribió", "escribimos", "escribisteis", "escribieron"],
            imperfecto: ["escribía", "escribías", "escribía", "escribíamos", "escribíais", "escribían"]
        },
        dormir: {
            present:    ["duermo", "duermes", "duerme", "dormimos", "dormís", "duermen"],
            indefinido: ["dormí", "dormiste", "durmió", "dormimos", "dormisteis", "durmieron"],
            imperfecto: ["dormía", "dormías", "dormía", "dormíamos", "dormíais", "dormían"]
        },
        dejar: {
            present:    ["dejo", "dejas", "deja", "dejamos", "dejáis", "dejan"],
            indefinido: ["dejé", "dejaste", "dejó", "dejamos", "dejasteis", "dejaron"],
            imperfecto: ["dejaba", "dejabas", "dejaba", "dejábamos", "dejabais", "dejaban"]
        },
        decir: {
            present:    ["digo", "dices", "dice", "decimos", "decís", "dicen"],
            indefinido: ["dije", "dijiste", "dijo", "dijimos", "dijisteis", "dijeron"],
            imperfecto: ["decía", "decías", "decía", "decíamos", "decíais", "decían"]
        },
        haber: {

            indefinido: ["hube", "hubiste", "hubo", "hubimos", "hubisteis", "hubieron"],
            imperfecto: ["había", "habías", "había", "habíamos", "habíais", "habían"]
        },

            indefinido: ["entendí", "entendiste", "entendió", "entendimos", "entendisteis", "entendieron"],
            imperfecto: ["entendía", "entendías", "entendía", "entendíamos", "entendíais", "entendían"]
        },

            present:    ["voy", "vas", "va", "vamos", "vais", "van"],
            indefinido: ["fui", "fuiste", "fue", "fuimos", "fuisteis", "fueron"],
            imperfecto: ["iba", "ibas", "iba", "íbamos", "ibais", "iban"]
        },
        abrir: {
            present:    ["abro", "abres", "abre", "abrimos", "abrís", "abren"],
            indefinido: ["abrí", "abriste", "abrió", "abrimos", "abristeis", "abrieron"],
            imperfecto: ["abría", "abrías", "abría", "abríamos", "abríais", "abrían"]
        },
        caber: {
            present:    ["quepo", "cabes", "cabe", "cabemos", "cabéis", "caben"],
            indefinido: ["cupe", "cupiste", "cupo", "cupimos", "cupisteis", "cupieron"],
            imperfecto: ["cabía", "cabías", "cabía", "cabíamos", "cabíais", "cabían"]
        },
        decidir: {
            present:    ["decido", "decides", "decide", "decidimos", "decidís", "deciden"],
            indefinido: ["decidí", "decidiste", "decidió", "decidimos", "decidisteis", "decidieron"],
            imperfecto: ["decidía", "decidías", "decidía", "decidíamos", "decidíais", "decidían"]
        },
        hacer: {
            present:    ["hago", "haces", "hace", "hacemos", "hacéis", "hacen"],
            indefinido: ["hice", "hiciste", "hizo", "hicimos", "hicisteis", "hicieron"],
            imperfecto: ["hacía", "hacías", "hacía", "hacíamos", "hacíais", "hacían"]
        },
        levantar: {
            present:    ["levanto", "levantas", "levanta", "levantamos", "levantáis", "levantan"],
            indefinido: ["levanté", "levantaste", "levantó", "levantamos", "levantasteis", "levantaron"],
            imperfecto: ["levantaba", "levantabas", "levantaba", "levantábamos", "levantabais", "levantaban"]
        },
        levantarse: {
            present:    ["me levanto", "te levantas", "se levanta", "nos levantamos", "os levantáis", "se levantan"],
            indefinido: ["me levanté", "te levantaste", "se levantó", "nos levantamos", "os levantasteis", "se levantaron"],
            imperfecto: ["me levantaba", "te levantabas", "se levantaba", "nos levantábamos", "os levantabais", "se levantaban"]
        },
        salir: {
            present:    ["salgo", "sales", "sale", "salimos", "salís", "salen"],
            indefinido: ["salí", "saliste", "salió", "salimos", "salisteis", "salieron"],
            imperfecto: ["salía", "salías", "salía", "salíamos", "salíais", "salían"]
        },
        saber: {
            present:    ["sé", "sabes", "sabe", "sabemos", "sabéis", "saben"],
            indefinido: ["supe", "supiste", "supo", "supimos", "supisteis", "supieron"],
            imperfecto: ["sabía", "sabías", "sabía", "sabíamos", "sabíais", "sabían"]
        },
        querer: {
            present:    ["quiero", "quieres", "quiere", "queremos", "queréis", "quieren"],
            indefinido: ["quise", "quisiste", "quiso", "quisimos", "quisisteis", "quisieron"],
            imperfecto: ["quería", "querías", "quería", "queríamos", "queríais", "querían"]
        },
        vestirse: {
            present:    ["me visto", "te vistes", "se viste", "nos vestimos", "os vestís", "se visten"],
            indefinido: ["me vestí", "te vestiste", "se vistió", "nos vestimos", "os vestisteis", "se vistieron"],
            imperfecto: ["me vestía", "te vestías", "se vestía", "nos vestíamos", "os vestíais", "se vestían"]
        }
    };

    const irregularParticiples = {
        ser:        "sido",
        ir:         "ido",
        volver:     "vuelto",
        ver:        "visto",
        poner:      "puesto",
        hacer:      "hecho",
        abrir:      "abierto",
        decir:      "dicho",
        escribir:   "escrito",
        cubrir:     "cubierto",
        morir:      "muerto",
        romper:     "roto",
        resolver:   "resuelto",
        venir:      "venido",
        traer:      "traído",
        tener:      "tenido",
        sentir:     "sentido",
        dormir:     "dormido",
        dejar:      "dejado",
        abrir:      "abierto",
        caber:      "cabido",
        decidir:    "decidido",
        hacer:      "hecho",
        levantar:   "levantado",
        levantarse: "levantado",
        salir:      "salido",
        saber:      "sabido",
        querer:     "querido",
        vestirse:   "vestido"
    };

    function participle(v) {
        return irregularParticiples[v] || (v.endsWith("ar") ? v.slice(0, -2) + "ado" : v.slice(0, -2) + "ido");
    }

    function gerund(v) {
        return v.endsWith("ar") ? v.slice(0, -2) + "ando" : v.slice(0, -2) + "iendo";
    }

    function normalizeAccents(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/ñ/g, "n");
    }

    function conjugate(v, t, p) {
        if (t === "perfecto")
            return haber[p] + " " + participle(v);
        if (t === "gerundio")
            return estarForms[p] + " " + gerund(v);
        if (irregulars[v] && irregulars[v][t])
            return irregulars[v][t][p];
        let stem = v.slice(0, -2), end = v.slice(-2);
        const endings = {
            present: {
                ar: ["o", "as", "a", "amos", "áis", "an"],
                er: ["o", "es", "e", "emos", "éis", "en"],
                ir: ["o", "es", "e", "imos", "ís", "en"]
            },
            indefinido: {
                ar: ["é", "aste", "ó", "amos", "asteis", "aron"],
                er: ["í", "iste", "ió", "imos", "isteis", "ieron"],
                ir: ["í", "iste", "ió", "imos", "isteis", "ieron"]
            },
            imperfecto: {
                ar: ["aba", "abas", "aba", "ábamos", "abais", "aban"],
                er: ["ía", "ías", "ía", "íamos", "íais", "ían"],
                ir: ["ía", "ías", "ía", "íamos", "íais", "ían"]
            }
        };
        return stem + endings[t][end][p];
    }

    // ---------------- SELECTOR HELPERS ----------------
    function renderCheckboxes(containerId, items, storageKey) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        let saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
        items.forEach(i => {
            const value = i.v || i;
            const checked = saved.includes(value);
            const label = document.createElement("label");
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.value = value;
            cb.checked = checked;

            // save immediately when clicked
            cb.addEventListener("change", () => getSelected(containerId, storageKey));

            label.appendChild(cb);
            label.appendChild(document.createTextNode(" " + (i.l || i)));
            container.appendChild(label);
        });
    }

    function getSelected(containerId, storageKey) {
        const cbs = document.querySelectorAll(`#${containerId} input[type=checkbox]`);
        const selected = Array.from(cbs).filter(cb => cb.checked).map(cb => cb.value);
        localStorage.setItem(storageKey, JSON.stringify(selected)); // always store array
        return selected;
    }

    function getSelectedVerbs() {
        return getSelected("verbSelector", "selectedVerbs");
    }

    function getSelectedTenses() {
        return getSelected("tenseSelector", "selectedTenses");
    }

    function selectAll(containerId, storageKey) {
        document.querySelectorAll(`#${containerId} input`).forEach(cb => cb.checked = true);
        getSelected(containerId, storageKey);
    }

    function selectNone(containerId, storageKey) {
        document.querySelectorAll(`#${containerId} input`).forEach(cb => cb.checked = false);
        getSelected(containerId, storageKey);
    }

    function toggleVerbSelector() {
        const c = document.getElementById("verbSelectorContainer");
        c.style.display = c.style.display === "none" ? "block" : "none";
        renderCheckboxes("verbSelector", getVerbList(), "selectedVerbs");
    }

    function toggleTenseSelector() {
        const c = document.getElementById("tenseSelectorContainer");
        c.style.display = c.style.display === "none" ? "block" : "none";
        const tensesForCheckbox = Object.keys(tenseLabels).map(key => ({v: key, l: tenseLabels[key]}));
        renderCheckboxes("tenseSelector", tensesForCheckbox, "selectedTenses");
    }

    function selectAllVerbs() {
        selectAll("verbSelector", "selectedVerbs");
    }

    function selectNoVerbs() {
        selectNone("verbSelector", "selectedVerbs");
    }

    function selectAllTenses() {
        selectAll("tenseSelector", "selectedTenses");
    }

    function selectNoTenses() {
        selectNone("tenseSelector", "selectedTenses");
    }

    function getVerbList() {
        return document.getElementById("verbs").value.split(",").map(v => v.trim()).filter(v => v.length > 0);
    }

    // ---------------- SRS & QUESTION LOGIC ----------------
    let srs = JSON.parse(localStorage.getItem("srs") || "{}"), current = {}, totalQuestions = 0, correctAnswers = 0;

    function getKey(v, t, p) {
        return v + "|" + t + "|" + p;
    }

    function getCard(v, t, p) {
        let k = getKey(v, t, p);
        if (!srs[k])
            srs[k] = {ease: 2.5, interval: 1, due: 0};
        return srs[k];
    }

    // ---------------- PICK CARD (all selected verbs & tenses) ----------------
    function pickCard(verbs, tenses) {
        if (verbs.length === 0 || tenses.length === 0) return null;

        // pick a random verb
        const v = verbs[Math.floor(Math.random() * verbs.length)];
        // pick a random tense
        const t = tenses[Math.floor(Math.random() * tenses.length)];
        // pick a random subject
        const s = subjects[Math.floor(Math.random() * subjects.length)];

        // get SRS card for this combination (keep interval/ease tracking)
        const card = getCard(v, t, s.i);

        return {v, t, s, card};
    }

    function updateCounter() {
        document.getElementById("counter").innerText = `Questions: ${totalQuestions} | Correct: ${correctAnswers}`;
    }

    // ---------------- NEXT QUESTION ----------------
    function nextQ() {
        document.getElementById("fullConjugation").style.display = "none";
        document.getElementById("toggleConjugationBtn").innerText = "Show full conjugation";

        const verbs = getSelectedVerbs();
        const tenses = getSelectedTenses();
        if (verbs.length === 0 || tenses.length === 0) {
            document.getElementById("question").innerText = "Select at least one verb and one tense";
            return;
        }

        const item = pickCard(verbs, tenses);
        if (!item) {
            document.getElementById("question").innerText = "🎉 Nothing due!";
            return;
        }

        current = item;
        const template = sentenceTemplates[item.t][Math.floor(Math.random() * sentenceTemplates[item.t].length)];
        document.getElementById("question").innerHTML =
            template.replace("___", item.s.p + " ... (" + item.v + ") <span class='tense'>[" + tenseLabels[item.t] + "]</span>");
        document.getElementById("answer").value = "";
        document.getElementById("feedback").innerText = "";
        setTimeout(() => document.getElementById("answer").focus(), 0);
    }

    function updateSRS(card, correct) {
        if (correct) {
            card.interval = Math.round(card.interval * card.ease);
            card.ease += 0.1;
        } else {
            card.interval = 1;
            card.ease = Math.max(1.3, card.ease - 0.2);
        }
        card.due = Date.now() + card.interval * 86400000;
    }

    function check() {
        let user = document.getElementById("answer").value.trim().toLowerCase();
        let correct = conjugate(current.v, current.t, current.s.i);
        let okStrict = user === correct;
        let okLoose = normalizeAccents(user) === normalizeAccents(correct);

        if (okStrict)
            document.getElementById("feedback").innerHTML = "<span class='good'>Correct</span>";
        else if (okLoose)
            document.getElementById("feedback").innerHTML = "<span class='good'>Almost correct — check accent: <b>" + correct + "</b></span>";
        else
            document.getElementById("feedback").innerHTML = "<span class='bad'>Wrong → <b>" + correct + "</b></span>";

        updateSRS(current.card, okStrict || okLoose);
        localStorage.setItem("srs", JSON.stringify(srs));

        totalQuestions++;
        if (okStrict || okLoose) correctAnswers++;
        updateCounter();

        // Delay before next question
        if (okStrict)
            setTimeout(nextQ, 1000);   // exact correct → 1s
        else if (okLoose)
            setTimeout(nextQ, 3000); // almost correct → 3s
        else
            setTimeout(nextQ, 10000); // incorrect → 10s
    }

    // ---------------- FULL CONJUGATION ----------------
    function showFullConjugation() {
        if (!current.v) return;
        let v = current.v;
        let selectedTenses = getSelectedTenses();
        if (selectedTenses.length === 0) selectedTenses = Object.keys(tenseLabels); // fallback to all

        let html = `<b>${v}</b><br>
        <table border="1" cellspacing="0" cellpadding="4"
               style="font-size:15px; border-collapse: collapse; text-align:center;">`;

        // Table header: tenses
        html += "<tr><th style='padding:4px 6px;'>Subject</th>";
        selectedTenses.forEach(t => {
            html += `<th style='padding:4px 6px;'>${tenseLabels[t]}</th>`;
        });
        html += "</tr>";

        // Table rows: subjects
        subjects.forEach(s => {
            html += `<tr><td style='padding:4px 6px;'>${s.p}</td>`;
            selectedTenses.forEach(t => {
                let form;
                if (t === "gerundio") {
                    // Only the gerund form, drop "estar"
                    form = gerund(v);
                } else {
                    // Everything else stays as before
                    form = conjugate(v, t, s.i);
                }
                html += `<td style='padding:4px 6px;'>${form}</td>`;
            });
            html += "</tr>";
        });

        html += "</table>";

        const fc = document.getElementById("fullConjugation");
        fc.innerHTML = html;
        fc.style.display = "block";
        document.getElementById("toggleConjugationBtn").innerText = "Hide full conjugation";
    }

    function toggleFullConjugation() {
        const fc = document.getElementById("fullConjugation");
        if (fc.style.display === "none" || fc.style.display === "") {
            showFullConjugation();
        } else {
            fc.style.display = "none";
            document.getElementById("toggleConjugationBtn").innerText = "Show full conjugation";
        }
    }

    // ---------------- INIT ----------------
    window.toggleVerbSelector = toggleVerbSelector;
    window.toggleTenseSelector = toggleTenseSelector;
    window.selectAllVerbs = selectAllVerbs;
    window.selectNoVerbs = selectNoVerbs;
    window.selectAllTenses = selectAllTenses;
    window.selectNoTenses = selectNoTenses;
    window.nextQ = nextQ;
    window.check = check;
    window.toggleFullConjugation = toggleFullConjugation;

    document.addEventListener("DOMContentLoaded", () => {
        renderCheckboxes("verbSelector", getVerbList(), "selectedVerbs");
        const tensesForCheckbox = Object.keys(tenseLabels).map(key => ({v: key, l: tenseLabels[key]}));
        renderCheckboxes("tenseSelector", tensesForCheckbox, "selectedTenses");
        nextQ();

        // Trigger check() when Enter is pressed in the answer input
        document.getElementById("answer").addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                check();
            }
        });
    });
</script>
